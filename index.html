<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VANTAGE | Verified Athletic Intelligence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            line-height: 1.5;
            padding-bottom: 70px;
        }

        :root {
            --primary-blue: #3B82F6;
            --primary-purple: #8B5CF6;
            --success-green: #10B981;
            --error-red: #EF4444;
            --gray-light: #9CA3AF;
            --glass-bg: rgba(18, 18, 24, 0.8);
        }

        .navbar {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(59, 130, 246, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0.75rem 1.25rem;
        }

        .navbar-content {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, var(--primary-blue));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .desktop-nav {
            display: none;
            gap: 2rem;
        }

        .desktop-nav a {
            color: var(--gray-light);
            text-decoration: none;
            cursor: pointer;
        }

        .desktop-nav a:hover {
            color: var(--primary-blue);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(59, 130, 246, 0.15);
            display: flex;
            justify-content: space-around;
            padding: 0.5rem;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
            background: none;
            border: none;
            color: var(--gray-light);
            cursor: pointer;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
        }

        .nav-item.active {
            color: var(--primary-blue);
            background: rgba(59, 130, 246, 0.1);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 0.5px solid rgba(59, 130, 246, 0.15);
            border-radius: 20px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: rgba(18, 18, 24, 0.6);
            border-radius: 16px;
            padding: 0.875rem 0.5rem;
            text-align: center;
            cursor: pointer;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-blue);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--gray-light);
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(30, 30, 38, 0.8);
            border: 0.5px solid rgba(59, 130, 246, 0.3);
            border-radius: 30px;
            color: white;
            margin-bottom: 1rem;
        }

        .sort-options {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .sort-chip {
            background: rgba(30, 30, 38, 0.6);
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .sort-chip.active {
            background: var(--primary-blue);
        }

        .filters {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            margin-bottom: 1rem;
        }

        .filter-chip {
            background: rgba(30, 30, 38, 0.8);
            border: 0.5px solid rgba(59, 130, 246, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            white-space: nowrap;
            cursor: pointer;
        }

        .filter-chip.active {
            background: var(--primary-blue);
        }

        .athlete-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.875rem;
        }

        .athlete-card {
            background: rgba(18, 18, 24, 0.7);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .card-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 15;
        }

        .action-icon {
            width: 32px;
            height: 32px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
        }

        .action-icon.active {
            background: #F59E0B;
            color: #000;
        }

        .compare-checkbox {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 32px;
            height: 32px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 15;
        }

        .compare-checkbox.selected {
            background: var(--primary-blue);
        }

        .athlete-avatar {
            width: 100%;
            aspect-ratio: 1/1;
            background: linear-gradient(135deg, #1e3a5f, #0f2b3d);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .athlete-avatar span {
            font-size: 3rem;
        }

        .jersey-number {
            position: absolute;
            bottom: 8px;
            right: 12px;
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .athlete-info {
            padding: 0.75rem;
        }

        .athlete-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .athlete-school {
            font-size: 0.7rem;
            color: var(--gray-light);
        }

        .metrics-container {
            display: flex;
            gap: 0.5rem;
            margin: 0.5rem 0;
        }

        .metric-item {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 0.35rem;
            text-align: center;
        }

        .metric-value {
            font-weight: 700;
            color: var(--primary-blue);
        }

        .metric-label {
            font-size: 0.6rem;
        }

        .verified-badge {
            background: linear-gradient(135deg, var(--success-green), #059669);
            font-size: 0.6rem;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            display: inline-block;
        }

        .pending-badge {
            background: rgba(245, 158, 11, 0.2);
            color: #F59E0B;
            font-size: 0.6rem;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            display: inline-block;
        }

        .mode-toggle {
            background: rgba(30, 30, 38, 0.8);
            border-radius: 40px;
            padding: 0.25rem;
            display: inline-flex;
            margin-bottom: 1rem;
        }

        .mode-btn {
            padding: 0.5rem 1.25rem;
            border-radius: 30px;
            background: transparent;
            color: var(--gray-light);
            cursor: pointer;
            border: none;
        }

        .mode-btn.active {
            background: var(--primary-blue);
            color: white;
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }

        .comparison-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
        }

        .btn-primary, .btn-secondary {
            padding: 0.75rem;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-blue), #2563eb);
            border: none;
            color: white;
        }

        .btn-secondary {
            background: rgba(59, 130, 246, 0.2);
            border: 0.5px solid rgba(59, 130, 246, 0.5);
            color: var(--primary-blue);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: rgba(18, 18, 24, 0.95);
            border-radius: 28px;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 0.75rem 1.5rem;
            border-radius: 40px;
            z-index: 2000;
            animation: fadeInUp 0.3s ease;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--gray-light);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @media (min-width: 768px) {
            .bottom-nav {
                display: none;
            }
            .desktop-nav {
                display: flex;
            }
            .athlete-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="navbar-content">
        <div class="logo">VANTAGE</div>
        <div class="desktop-nav">
            <a data-page="discover">Discover</a>
            <a data-page="submit">Get Verified</a>
            <a data-page="scout">Scout Portal</a>
            <a data-page="leaderboard">Leaderboard</a>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <button class="nav-item" data-page="discover"><span>🔍</span><span>Discover</span></button>
    <button class="nav-item" data-page="submit"><span>📤</span><span>Verify</span></button>
    <button class="nav-item" data-page="scout"><span>🎯</span><span>Scout</span></button>
    <button class="nav-item" data-page="leaderboard"><span>⭐</span><span>Leaderboard</span></button>
</div>

<div class="container">
    <!-- DISCOVER PAGE -->
    <div id="discoverPage" class="page active">
        <h1>Verified Athletes</h1>
        <div class="stats-grid">
            <div class="stat-card" onclick="applyFilter('all')"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Athletes</div></div>
            <div class="stat-card" onclick="applyFilter('verified')"><div class="stat-value" id="statVerified">0</div><div class="stat-label">Verified</div></div>
            <div class="stat-card" onclick="applyFilter('pending')"><div class="stat-value" id="statPending">0</div><div class="stat-label">Pending</div></div>
            <div class="stat-card"><div class="stat-value" id="statAvgVert">0</div><div class="stat-label">Avg Vertical</div></div>
        </div>
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search athletes...">
        <div class="sort-options">
            <span class="sort-chip active" data-sort="default">Default</span>
            <span class="sort-chip" data-sort="vertical">Highest Vertical</span>
            <span class="sort-chip" data-sort="trust">Top Trust</span>
        </div>
        <div class="filters">
            <div class="filter-chip active" data-filter="all">All</div>
            <div class="filter-chip" data-filter="verified">Verified</div>
            <div class="filter-chip" data-filter="pending">Pending</div>
        </div>
        <div class="athlete-grid" id="athleteGrid"></div>
    </div>

    <!-- SUBMIT PAGE -->
    <div id="submitPage" class="page">
        <h1>Get Verified</h1>
        <div class="card">
            <input type="url" id="videoUrl" class="search-input" placeholder="Video URL (Instagram, YouTube, etc.)" style="margin-bottom:1rem;">
            <input type="text" id="athleteName" class="search-input" placeholder="Full Name" style="margin-bottom:1rem;">
            <input type="text" id="athleteSchool" class="search-input" placeholder="School/Team" style="margin-bottom:1rem;">
            <select id="athletePosition" class="search-input" style="margin-bottom:1rem;">
                <option>PG</option><option>SG</option><option>SF</option><option>PF</option><option>C</option>
            </select>
            <input type="number" id="claimedVertical" class="search-input" placeholder="Claimed Vertical (inches)" style="margin-bottom:1rem;">
            <input type="number" step="0.01" id="claimedSprint" class="search-input" placeholder="Claimed 40-Yard Sprint (seconds)" style="margin-bottom:1rem;">
            <button class="btn-primary" id="submitBtn">Submit for AI Analysis</button>
            <div id="submitResult" style="margin-top:1rem;"></div>
        </div>
    </div>

    <!-- SCOUT PORTAL -->
    <div id="scoutPage" class="page">
        <h1>Scout Portal</h1>
        <div class="mode-toggle">
            <button class="mode-btn active" data-mode="watchlist">📋 Watchlist</button>
            <button class="mode-btn" data-mode="compare">📊 Compare</button>
        </div>
        <div id="watchlistMode">
            <div class="athlete-grid" id="watchlistGrid"></div>
            <button class="btn-secondary" id="exportCsvBtn">📥 Export CSV</button>
        </div>
        <div id="compareMode" style="display:none;">
            <div id="compareList" class="comparison-grid"></div>
            <button class="btn-primary" id="refreshCompareBtn">⟳ Reset Comparison</button>
        </div>
    </div>

    <!-- LEADERBOARD -->
    <div id="leaderboardPage" class="page">
        <h1>Trust Leaderboard</h1>
        <div class="card" id="leaderboardList"></div>
        <div class="card">
            <h3>Your Scout Profile</h3>
            <div>Confirmations: <strong id="userConfirmCount">0</strong></div>
            <div>Trust Score: <strong id="userTrustDisplay">85</strong></div>
        </div>
    </div>
</div>

<!-- MODALS -->
<div id="detailModal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal('detailModal')" style="float:right; cursor:pointer;">&times;</span>
        <div id="detailContent"></div>
        <div style="display:flex; gap:0.5rem; margin-top:1rem;">
            <button class="btn-primary" id="confirmDetailBtn" style="flex:1;">✓ Confirm</button>
            <button class="btn-secondary" id="watchlistDetailBtn" style="flex:1;">⭐ Save</button>
        </div>
    </div>
</div>

<script>
    const BACKEND_URL = 'https://vantage-backend-production-6d44.up.railway.app';
    
    let athletes = [];
    let currentScout = { id: 'scout_001', name: 'Demo Scout', trustScore: 85, confirmationsMade: 3, watchlist: [], confirmedAthleteIds: [] };
    let compareSelectedIds = [];
    let currentFilter = 'all';
    let currentSearch = '';
    let currentSort = 'default';
    let currentDetailAthlete = null;

    // API Calls
    async function loadAthletes() {
        try {
            const response = await fetch(`${BACKEND_URL}/athletes`);
            if (response.ok) {
                athletes = await response.json();
            } else {
                athletes = getSeedAthletes();
            }
        } catch (error) {
            console.log('Using seed data');
            athletes = getSeedAthletes();
        }
        await loadScoutProfile();
        renderAll();
    }

    function getSeedAthletes() {
        return [
            { id: 1, name: "Marcus Thompson", school: "Westlake High", position: "SG", jerseyNum: "23", classYear: 2025, flagged: false, metrics: { vertical: { value: 42, status: "verified", verifications: 5 }, sprint: { value: 4.38, status: "verified", verifications: 4 } }, trustScore: 94, confirmations: ["Coach Miller"], views: 342, hasClip: true },
            { id: 2, name: "Jaylen Carter", school: "Mater Dei", position: "PG", jerseyNum: "11", classYear: 2025, flagged: false, metrics: { vertical: { value: 38, status: "verified", verifications: 4 }, sprint: { value: 4.45, status: "pending", verifications: 1 } }, trustScore: 91, confirmations: ["Coach Miller"], views: 189, hasClip: true },
            { id: 3, name: "Elijah Williams", school: "IMG Academy", position: "SF", jerseyNum: "7", classYear: 2026, flagged: false, metrics: { vertical: { value: 44, status: "verified", verifications: 7 }, sprint: { value: 4.28, status: "verified", verifications: 6 } }, trustScore: 96, confirmations: ["Coach Miller"], views: 567, hasClip: true },
            { id: 4, name: "Tyler Brooks", school: "Montverde Academy", position: "PF", jerseyNum: "34", classYear: 2026, flagged: false, metrics: { vertical: { value: 35, status: "pending", verifications: 1 }, sprint: { value: null, status: null } }, trustScore: 0, confirmations: ["Coach Miller"], views: 45, hasClip: false },
            { id: 5, name: "Jordan Lee", school: "Sierra Canyon", position: "SG", jerseyNum: "5", classYear: 2025, flagged: false, metrics: { vertical: { value: 40, status: "pending", verifications: 1 }, sprint: { value: 4.42, status: "pending", verifications: 0 } }, trustScore: 0, confirmations: [], views: 34, hasClip: false },
            { id: 6, name: "Malik Henderson", school: "Oak Hill Academy", position: "PG", jerseyNum: "1", classYear: 2026, flagged: false, metrics: { vertical: { value: 37, status: "pending", verifications: 0 }, sprint: { value: 4.35, status: "pending", verifications: 0 } }, trustScore: 0, confirmations: [], views: 28, hasClip: true }
        ];
    }

    async function loadScoutProfile() {
        try {
            const response = await fetch(`${BACKEND_URL}/scout/scout_001`);
            if (response.ok) {
                currentScout = await response.json();
            }
        } catch (error) {
            console.log('Using default scout profile');
        }
        updateStats();
    }

    async function confirmAthlete(athleteId) {
        try {
            const response = await fetch(`${BACKEND_URL}/confirm`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    athlete_id: athleteId,
                    scout_id: currentScout.id,
                    scout_name: currentScout.name
                })
            });
            const result = await response.json();
            if (response.ok) {
                showToast(result.message, 'success');
                await loadAthletes();
                return true;
            }
        } catch (error) {
            showToast('Failed to confirm', 'error');
        }
        return false;
    }

    async function updateWatchlist(athleteId) {
        try {
            const response = await fetch(`${BACKEND_URL}/watchlist`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    scout_id: currentScout.id,
                    athlete_id: athleteId
                })
            });
            const result = await response.json();
            showToast(result.message, 'success');
            await loadScoutProfile();
            renderAll();
        } catch (error) {
            showToast('Failed to update watchlist', 'error');
        }
    }

    async function submitAthlete() {
        const videoSource = document.getElementById('videoUrl').value.trim();
        const name = document.getElementById('athleteName').value.trim();
        const school = document.getElementById('athleteSchool').value.trim();
        const position = document.getElementById('athletePosition').value;
        const claimedVertical = parseFloat(document.getElementById('claimedVertical').value);
        const claimedSprint = parseFloat(document.getElementById('claimedSprint').value);
        const resultDiv = document.getElementById('submitResult');

        if (!videoSource || !name) {
            resultDiv.innerHTML = '<div style="color:#EF4444;">Video URL and Name required</div>';
            return;
        }

        const newId = Date.now();
        
        try {
            const response = await fetch(`${BACKEND_URL}/verify`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    video_source: videoSource,
                    athlete_id: newId,
                    athlete_name: name,
                    athlete_school: school || "Not specified",
                    athlete_position: position,
                    claimed_vertical: claimedVertical || 36,
                    claimed_sprint: claimedSprint || 4.5
                })
            });
            
            const data = await response.json();
            
            if (data.success) {
                resultDiv.innerHTML = `<div style="color:#10B981;">✅ AI Analysis Complete!<br>🏀 Vertical: ${data.vertical_inches}"<br>🏃 Sprint: ${data.sprint_seconds}s</div>`;
                document.getElementById('videoUrl').value = '';
                document.getElementById('athleteName').value = '';
                document.getElementById('athleteSchool').value = '';
                document.getElementById('claimedVertical').value = '';
                document.getElementById('claimedSprint').value = '';
                await loadAthletes();
                showPage('discover');
                showToast('Athlete submitted successfully!', 'success');
            }
        } catch (error) {
            resultDiv.innerHTML = `<div style="color:#EF4444;">Error: ${error.message}</div>`;
        }
    }

    function getFilteredAthletes() {
        let filtered = athletes.filter(a => !a.flagged);
        if (currentFilter === 'verified') filtered = filtered.filter(a => a.metrics.vertical?.status === 'verified');
        if (currentFilter === 'pending') filtered = filtered.filter(a => a.metrics.vertical?.status === 'pending');
        if (currentSearch) filtered = filtered.filter(a => a.name.toLowerCase().includes(currentSearch) || a.school.toLowerCase().includes(currentSearch));
        if (currentSort === 'vertical') filtered.sort((a, b) => (b.metrics.vertical?.value || 0) - (a.metrics.vertical?.value || 0));
        if (currentSort === 'trust') filtered.sort((a, b) => (b.trustScore || 0) - (a.trustScore || 0));
        return filtered;
    }

    function renderAthleteGrid() {
        const grid = document.getElementById('athleteGrid');
        if (!grid) return;
        const filtered = getFilteredAthletes();
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="empty-state">No athletes found</div>';
            return;
        }
        
        grid.innerHTML = filtered.map(a => {
            const inWatchlist = currentScout.watchlist.includes(a.id);
            const inCompare = compareSelectedIds.includes(a.id);
            const isVerified = a.metrics.vertical?.status === 'verified';
            return `
                <div class="athlete-card" data-id="${a.id}">
                    <div class="card-actions">
                        <div class="action-icon ${inWatchlist ? 'active' : ''}" data-watch="${a.id}">${inWatchlist ? '⭐' : '☆'}</div>
                    </div>
                    <div class="compare-checkbox ${inCompare ? 'selected' : ''}" data-comp="${a.id}">${inCompare ? '✓' : ''}</div>
                    <div class="athlete-avatar">
                        <span>🏀</span>
                        <div class="jersey-number">#${a.jerseyNum}</div>
                    </div>
                    <div class="athlete-info">
                        <div class="athlete-name">${a.name}</div>
                        <div class="athlete-school">${a.school} · ${a.position}</div>
                        <div class="metrics-container">
                            <div class="metric-item">
                                <div class="metric-value">${a.metrics.vertical?.value || '?'}"</div>
                                <div class="metric-label">Vert</div>
                            </div>
                            <div class="metric-item">
                                <div class="metric-value">${a.metrics.sprint?.value || '—'}s</div>
                                <div class="metric-label">Sprint</div>
                            </div>
                        </div>
                        ${isVerified ? '<span class="verified-badge">✓ Verified</span>' : '<span class="pending-badge">⏳ Pending</span>'}
                    </div>
                </div>
            `;
        }).join('');

        document.querySelectorAll('[data-watch]').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                updateWatchlist(parseInt(el.dataset.watch));
            });
        });
        document.querySelectorAll('[data-comp]').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleCompare(parseInt(el.dataset.comp));
            });
        });
        document.querySelectorAll('.athlete-card').forEach(card => {
            card.addEventListener('click', () => showAthleteDetail(parseInt(card.dataset.id)));
        });
    }

    function renderWatchlist() {
        const grid = document.getElementById('watchlistGrid');
        if (!grid) return;
        const watchlistAthletes = athletes.filter(a => currentScout.watchlist.includes(a.id));
        if (watchlistAthletes.length === 0) {
            grid.innerHTML = '<div class="empty-state">No athletes in watchlist<br>⭐ Tap star on any athlete to save</div>';
            return;
        }
        grid.innerHTML = watchlistAthletes.map(a => `
            <div class="athlete-card" data-id="${a.id}" style="padding:0.75rem;">
                <div class="athlete-name">${a.name}</div>
                <div class="athlete-school">${a.school} · ${a.position}</div>
                <div style="margin-top:0.5rem;">🏀 ${a.metrics.vertical?.value || '?'}"  ⭐ ${a.trustScore || 'Pending'}</div>
            </div>
        `).join('');
        document.querySelectorAll('#watchlistGrid .athlete-card').forEach(card => {
            card.addEventListener('click', () => showAthleteDetail(parseInt(card.dataset.id)));
        });
    }

    function renderComparison() {
        const container = document.getElementById('compareList');
        if (!container) return;
        const compareAthletes = athletes.filter(a => compareSelectedIds.includes(a.id));
        if (compareAthletes.length === 0) {
            container.innerHTML = '<div class="empty-state">Select athletes to compare using checkboxes on Discover page</div>';
            return;
        }
        container.innerHTML = compareAthletes.map(a => `
            <div class="comparison-card">
                <div class="athlete-name">${a.name}</div>
                <div>🏀 Vertical: <strong>${a.metrics.vertical?.value || 'N/A'}"</strong></div>
                <div>🏃 Sprint: <strong>${a.metrics.sprint?.value || 'N/A'}s</strong></div>
                <div>⭐ Trust: <strong>${a.trustScore || 'Pending'}</strong></div>
                <button class="btn-secondary" onclick="showAthleteDetail(${a.id})" style="margin-top:0.5rem;">View Profile</button>
            </div>
        `).join('');
    }

    function renderLeaderboard() {
        const container = document.getElementById('leaderboardList');
        if (!container) return;
        const sorted = [...athletes].filter(a => a.trustScore > 0).sort((a, b) => b.trustScore - a.trustScore).slice(0, 5);
        container.innerHTML = `<h3>Top Verified Athletes</h3>` + sorted.map((a, i) => 
            `<div style="padding:0.75rem; border-bottom:0.5px solid rgba(59,130,246,0.15);">
                <strong>${i+1}.</strong> ${a.name} ⭐ ${a.trustScore}
            </div>`
        ).join('');
    }

    function updateStats() {
        const active = athletes.filter(a => !a.flagged).length;
        const verified = athletes.filter(a => !a.flagged && a.metrics.vertical?.status === 'verified').length;
        document.getElementById('statTotal').innerText = active;
        document.getElementById('statVerified').innerText = verified;
        document.getElementById('statPending').innerText = active - verified;
        let sum = 0, cnt = 0;
        athletes.forEach(a => { if (a.metrics.vertical?.value) { sum += a.metrics.vertical.value; cnt++; } });
        document.getElementById('statAvgVert').innerText = cnt ? Math.round(sum / cnt) : 0;
        document.getElementById('userConfirmCount').innerText = currentScout.confirmationsMade;
        document.getElementById('userTrustDisplay').innerText = currentScout.trustScore;
    }

    function toggleCompare(athleteId) {
        const idx = compareSelectedIds.indexOf(athleteId);
        if (idx === -1 && compareSelectedIds.length < 4) {
            compareSelectedIds.push(athleteId);
            showToast(`Added to compare (${compareSelectedIds.length}/4)`, 'success');
        } else if (idx !== -1) {
            compareSelectedIds.splice(idx, 1);
            showToast('Removed from comparison', 'info');
        } else {
            showToast('Max 4 athletes for comparison', 'error');
        }
        renderAthleteGrid();
        renderComparison();
    }

    function showAthleteDetail(athleteId) {
        const athlete = athletes.find(a => a.id === athleteId);
        if (!athlete) return;
        currentDetailAthlete = athlete;
        const inWatchlist = currentScout.watchlist.includes(athlete.id);
        const isVerified = athlete.metrics.vertical?.status === 'verified';
        
        document.getElementById('detailContent').innerHTML = `
            <h2>${athlete.name}</h2>
            <p style="color:var(--gray-light);">${athlete.school} · ${athlete.position} · #${athlete.jerseyNum}</p>
            <div style="background:rgba(0,0,0,0.3); border-radius:12px; padding:1rem; margin:1rem 0;">
                <div>🏀 Vertical Leap: <strong>${athlete.metrics.vertical?.value || '?'}"</strong> ${isVerified ? '✅ Verified' : '⏳ Pending'}</div>
                <div>🏃 40-Yard Sprint: <strong>${athlete.metrics.sprint?.value || '—'}s</strong></div>
                <div>⭐ Trust Score: ${athlete.trustScore || 'Pending'}</div>
                <div>👁️ ${athlete.views || 0} views</div>
            </div>
        `;
        document.getElementById('watchlistDetailBtn').innerText = inWatchlist ? '⭐ Remove' : '⭐ Save';
        showModal('detailModal');
    }

    async function handleConfirm() {
        if (currentDetailAthlete) {
            const success = await confirmAthlete(currentDetailAthlete.id);
            if (success) {
                closeModal('detailModal');
                await loadAthletes();
                renderAll();
            }
        }
    }

    async function handleWatchlistDetail() {
        if (currentDetailAthlete) {
            await updateWatchlist(currentDetailAthlete.id);
            closeModal('detailModal');
            await loadScoutProfile();
            renderAll();
        }
    }

    function exportToCSV() {
        const watchlistAthletes = athletes.filter(a => currentScout.watchlist.includes(a.id));
        if (watchlistAthletes.length === 0) {
            showToast('Watchlist is empty', 'error');
            return;
        }
        let csv = "Name,School,Position,Vertical,Sprint,Trust Score\n";
        watchlistAthletes.forEach(a => {
            csv += `"${a.name}","${a.school}",${a.position},${a.metrics.vertical?.value || 'N/A'},${a.metrics.sprint?.value || 'N/A'},${a.trustScore || 'Pending'}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `vantage_watchlist_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('CSV exported!', 'success');
    }

    function showToast(message, type = 'info') {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeft = `3px solid ${type === 'success' ? '#10B981' : '#3B82F6'}`;
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId + 'Page').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const nav = document.querySelector(`.nav-item[data-page="${pageId}"]`);
        if (nav) nav.classList.add('active');
        if (pageId === 'scout') {
            renderWatchlist();
            renderComparison();
        }
    }

    function applyFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        const active = document.querySelector(`.filter-chip[data-filter="${filter}"]`);
        if (active) active.classList.add('active');
        renderAthleteGrid();
    }

    function showModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // Event Listeners
    document.getElementById('submitBtn')?.addEventListener('click', submitAthlete);
    document.getElementById('confirmDetailBtn')?.addEventListener('click', handleConfirm);
    document.getElementById('watchlistDetailBtn')?.addEventListener('click', handleWatchlistDetail);
    document.getElementById('exportCsvBtn')?.addEventListener('click', exportToCSV);
    document.getElementById('refreshCompareBtn')?.addEventListener('click', () => {
        compareSelectedIds = [];
        renderAthleteGrid();
        renderComparison();
        showToast('Comparison reset', 'info');
    });
    document.getElementById('searchInput')?.addEventListener('input', (e) => {
        currentSearch = e.target.value.toLowerCase();
        renderAthleteGrid();
    });
    document.querySelectorAll('.sort-chip').forEach(c => c.addEventListener('click', function() {
        currentSort = this.dataset.sort;
        document.querySelectorAll('.sort-chip').forEach(s => s.classList.remove('active'));
        this.classList.add('active');
        renderAthleteGrid();
    }));
    document.querySelectorAll('.nav-item, .desktop-nav a').forEach(el => {
        el.addEventListener('click', () => {
            const page = el.dataset.page;
            if (page) showPage(page);
        });
    });
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const mode = btn.dataset.mode;
            document.getElementById('watchlistMode').style.display = mode === 'watchlist' ? 'block' : 'none';
            document.getElementById('compareMode').style.display = mode === 'compare' ? 'block' : 'none';
            if (mode === 'compare') renderComparison();
        });
    });
    window.onclick = (e) => { if (e.target.classList?.contains('modal')) closeModal(e.target.id); };

    // Initialize
    loadAthletes();
</script>
</body>
</html>
